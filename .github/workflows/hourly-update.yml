name: Hourly Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hourly-update
  cancel-in-progress: true

env:
  DATA_BRANCH: data
  BASE_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare data branch (reset to base)
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${BASE_BRANCH}"
          git fetch origin "${DATA_BRANCH}" || true
          git checkout -B "${DATA_BRANCH}" "origin/${BASE_BRANCH}"

          # Option B: restore the previous DB from the existing data branch (if present)
          # so `npm run update` can build incrementally.
          if git show "origin/${DATA_BRANCH}:sauna_bookings.sqlite" > sauna_bookings.sqlite 2>/dev/null; then
            echo "Restored sauna_bookings.sqlite from origin/${DATA_BRANCH}";
          else
            echo "No previous sauna_bookings.sqlite found on origin/${DATA_BRANCH}; starting fresh.";
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run update
        run: npm run update

      - name: Commit and push database to data branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sauna_bookings.sqlite


          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Hourly DB update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          fi

          git push --force-with-lease origin "${DATA_BRANCH}:${DATA_BRANCH}"
